# Deployment, Service, and PersistentVolume for the MySQL database used by the restaurant Django web API 
# The MySQL database Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-deployment
  labels:
    name: mysql-deployment
    app: restaurant-api
spec:
  replicas: 1 # Number of pod replicas to run
  selector:
    matchLabels:
      name: mysql-pod
      app: restaurant-api
  # Configuration for the pods
  template:
    metadata:
      name: mysql-pod
      labels:
        name: mysql-pod
        app: restaurant-api
    spec:
      containers:
      - name: mysql
        image: mysql:8.0
        ports:
        - containerPort: 3306 # Port that the container listens on
          # Environment variables that the official MySQL image expects (env field directly references the key)
        env:
        - name: MYSQL_DATABASE  # The name the DB container wants
          valueFrom:
            configMapKeyRef:
              name: api-config  # The ConfigMap source
              key: DB_NAME  # The source key ("AsgardCuisines")
        - name: MYSQL_USER
          valueFrom:
            configMapKeyRef:
              name: api-config  
              key: DB_USER
        - name: MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: api-secrets   # The Secret source
              key: DB_PASSWORD
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: api-secrets   
              key: MYSQL_ROOT_PASSWORD
        volumeMounts:
        - name: mysql-persistent-storage
          mountPath: /var/lib/mysql # The standard MySQL data path
      volumes:
      - name: mysql-persistent-storage
        persistentVolumeClaim:
          claimName: mysql-pvc # This should match the metadata.name in your PVC
---
# The internal Service to expose the MySQL database to other pods (like the Django API) within the cluster
apiVersion: v1
kind: Service
metadata:
  name: mysql-service
  labels:
    name: mysql-service
    app: restaurant-api
spec:
  ports:
    - port: 3306  # Port exposed by the Service
      targetPort: 3306  # Port on the pod to forward the request to
  selector:
    name: mysql-pod
    app: restaurant-api
---
# The Physical Storage for the pod (PV)
apiVersion: v1
kind: PersistentVolume
metadata:
  name: mysql-pv
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: "/mnt/data" # This folder is inside Minikube
---
# Requests specific resource size from the PersistentVolume for the pod (PVC)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi